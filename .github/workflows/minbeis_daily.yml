name: MINBEIS Daily Run

on:
  push:
    branches:
      - minbeis-automation-v1
      - minbeis-sheets-writeback
    paths:
      - "minbeis_automation_v1/**"
      - ".github/workflows/minbeis_daily.yml"
  pull_request:
    branches:
      - main
    paths:
      - "minbeis_automation_v1/**"
      - ".github/workflows/minbeis_daily.yml"
  schedule:
    # 18:30 Athens during summer = 15:30 UTC.
    - cron: "30 15 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

env:
  SPREADSHEET_ID: "1LnWr8AY9uYMsw93VArfiRfbu75Aod5Z1hAv9mOYHOYo"
  GOOGLE_SECRET_AVAILABLE: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON != '' }}

jobs:
  validate-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: minbeis_automation_v1/requirements.txt

      - name: Install dependencies
        working-directory: minbeis_automation_v1
        run: pip install -r requirements.txt

      - name: Compile Python sources
        working-directory: minbeis_automation_v1
        run: python -m compileall -q src tests run_minbeis.py

      - name: Run unit tests
        working-directory: minbeis_automation_v1
        run: python -m pytest -q

      - name: Run deterministic MINBEIS fixture
        working-directory: minbeis_automation_v1
        run: python run_minbeis.py --dry-run --fixture

      - name: Verify BUY PROBE and safety boundaries
        working-directory: minbeis_automation_v1
        run: |
          python - <<'PY'
          import csv
          from pathlib import Path

          files = sorted(Path("output").glob("broker_export_*.csv"))
          if not files:
              raise SystemExit("No broker export generated")

          with files[-1].open(encoding="utf-8") as f:
              rows = list(csv.DictReader(f))

          if not rows:
              raise SystemExit("Broker export is empty")

          boundary_violations = [
              r for r in rows
              if r["human_approval"] != "REQUIRED" or r["broker_executed"] != "NO"
          ]
          if boundary_violations:
              raise SystemExit("Human approval boundary violated")

          probes = [r for r in rows if r["action"] == "BUY PROBE"]
          if not probes:
              raise SystemExit("Engine failed to generate a controlled BUY PROBE in fixture mode")

          for probe in probes:
              allocation = float(probe["suggested_allocation"].rstrip("%"))
              if not 0.25 <= allocation <= 0.75:
                  raise SystemExit(f"Probe allocation outside allowed range: {allocation}%")
              if probe["entry_zone"] == "N/A" or probe["invalidation"] == "N/A":
                  raise SystemExit("BUY PROBE missing entry zone or invalidation")

          print(f"Verified {len(rows)} rows and {len(probes)} controlled BUY PROBE plan(s)")
          PY

      - name: Live delayed/public data smoke test
        id: live_smoke
        continue-on-error: true
        working-directory: minbeis_automation_v1
        run: python run_minbeis.py --dry-run

      - name: Record live smoke status
        working-directory: minbeis_automation_v1
        run: echo "live_smoke_outcome=${{ steps.live_smoke.outcome }}" > output/live_smoke_status.txt

      - name: Configure Google credentials securely
        if: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && env.GOOGLE_SECRET_AVAILABLE == 'true' && steps.live_smoke.outcome == 'success' }}
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          umask 077
          printf '%s' "$GCP_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/minbeis-service-account.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["RUNNER_TEMP"]) / "minbeis-service-account.json"
          data = json.loads(path.read_text(encoding="utf-8"))
          required = {"type", "project_id", "private_key", "client_email", "token_uri"}
          missing = required - set(data)
          if missing:
              raise SystemExit(f"Service-account JSON missing fields: {sorted(missing)}")
          if data.get("type") != "service_account":
              raise SystemExit("Credential is not a service-account JSON key")
          print("Service-account JSON validated without exposing secret values")
          PY
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/minbeis-service-account.json" >> "$GITHUB_ENV"
          echo "MINBEIS_WRITEBACK=true" >> "$GITHUB_ENV"

      - name: Write live MINBEIS results to Google Sheet
        if: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && env.GOOGLE_SECRET_AVAILABLE == 'true' && steps.live_smoke.outcome == 'success' }}
        working-directory: minbeis_automation_v1
        run: python run_minbeis.py --writeback

      - name: Explain skipped writeback
        if: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && env.GOOGLE_SECRET_AVAILABLE != 'true' }}
        run: echo "Google Sheet writeback skipped because GOOGLE_SERVICE_ACCOUNT_JSON secret is not configured."

      - name: Remove temporary Google credential
        if: always()
        run: rm -f "$RUNNER_TEMP/minbeis-service-account.json"

      - name: Upload MINBEIS run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minbeis-run-output
          path: minbeis_automation_v1/output/
          if-no-files-found: error
          retention-days: 14
